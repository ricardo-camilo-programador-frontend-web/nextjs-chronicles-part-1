name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validar Linting e Formatacao
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install

      - name: Executar Lint
        run: pnpm run lint

  build:
    name: Build do Projeto
    runs-on: ubuntu-latest
    timeout-minutes: 15
        env:
          NEXT_PUBLIC_SITE_URL: ""
          NEXT_PUBLIC_API_URL: ""
          NEXT_PUBLIC_PORTFOLIO_URL: ""
          NEXT_PUBLIC_GITHUB_URL: ""
          NEXT_PUBLIC_LINKEDIN_URL: ""
          NEXT_PUBLIC_X_URL: ""
          NEXT_PUBLIC_INSTAGRAM_URL: ""
          NEXT_PUBLIC_YOUTUBE_URL: ""
          NEXT_PUBLIC_FACEBOOK_URL: ""
          NEXT_PUBLIC_99FREELAS_URL: ""
          NEXT_PUBLIC_WORKANA_URL: ""
          NEXT_PUBLIC_BUYMEACOFFEE_URL: ""
          NEXT_PUBLIC_FIGMA_URL: ""
          NEXT_PUBLIC_CONTACT_EMAIL: ""
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ""
          NEXT_PUBLIC_GTM_ID: ""
          NEXT_PUBLIC_COUNTER_DEV_ID: ""
          NEXT_PUBLIC_LIVE_DEMO_VIDEO_URL: ""
          TREFLE_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install

      - name: Build do projeto
        run: pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/
          retention-days: 7

  security:
    name: Auditoria de Seguranca
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install

      - name: Auditoria de vulnerabilidades
        shell: bash
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"

          pnpm audit --audit-level moderate 2>&1 | tee "$LOG_FILE"
          status=${PIPESTATUS[0]}

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "ERR_PNPM_AUDIT_BAD_RESPONSE" "$LOG_FILE" && grep -Eq "responded with 5[0-9]{2}([^0-9]|$)|error \\(5[0-9]{2}\\)" "$LOG_FILE"; then
            echo "::warning::pnpm audit falhou por erro 5xx do endpoint de auditoria da npm."
            exit 0
          fi

          exit "$status"

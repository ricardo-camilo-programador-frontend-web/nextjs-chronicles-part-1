# ============================================================================
# PROJECT KEY - Identificador único do projeto no SonarQube
# ============================================================================
#
# IMPORTANTE: O projectKey é OBRIGATÓRIO e deve ser único no servidor SonarQube
#
# Para SonarCloud:
#   - Formato: organization_projectKey (ex: ricardocamiloconsir_nextjs-chronicles-part-1)
#   - O projeto é criado automaticamente na primeira análise
#
# Para SonarQube Self-Hosted:
#   - Você pode usar qualquer formato (ex: nextjs-chronicles-part-1)
#   - O projeto DEVE ser criado ANTES no servidor SonarQube:
#     1. Acesse: http://localhost:9000
#     2. Vá em: Projects > Create Project > Manual
#     3. Defina o Project Key (deve ser EXATAMENTE igual ao valor abaixo)
#     4. Defina o Display Name (pode ser diferente)
#
# Onde encontrar o projectKey no SonarQube:
#   - Na página do projeto: http://localhost:9000/dashboard?id=PROJECT_KEY
#   - No menu: Projects > [Seu Projeto] > Project Information > Key
# ============================================================================
sonar.projectKey=nextjs-chronicles-part-1

# sonar.organization: Apenas necessário para SonarCloud. Comente se usar SonarQube local.
# sonar.organization=ricardocamiloconsir

sonar.projectName=NextJS Chronicles - Breath Natural
sonar.projectVersion=1.0.0

# ============================================================================
# SOURCE CODE CONFIGURATION
# ============================================================================
# Diretórios de código fonte para análise (Next.js App Router)
sonar.sources=src,app,pages,public
sonar.tests=src

# ============================================================================
# EXCLUSÕES - Arquivos e diretórios que NÃO devem ser analisados
# ============================================================================
# Exclusões gerais
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/out/**,**/coverage/**,**/.turbo/**,**/vercel.json,**/netlify.toml,**/*.d.ts,**/*.config.js,**/*.config.ts,**/*.config.mjs,**/next-env.d.ts,**/.vscode/**,**/.cursor/**,**/.cursorrules,**/.git/**

# Exclusões específicas de testes
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/out/**,**/coverage/**,**/*.d.ts,**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx,**/tests/**,*.tsbuildinfo

# ============================================================================
# COVERAGE REPORTS
# ============================================================================
# Caminhos para relatórios de cobertura (se houver testes configurados)
# Descomente e ajuste quando configurar testes com Jest/Vitest
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.typescript.lcov.reportPaths=coverage/lcov.info

# ============================================================================
# SONAR TOKEN E HOST URL
# ============================================================================
# Estes valores são definidos via variáveis de ambiente no GitHub Actions
# sonar.token is set via environment variable SONAR_TOKEN
# sonar.host.url is set via environment variable SONAR_HOST_URL

# ============================================================================
# TEST EXECUTION REPORT (opcional - para executar testes na análise)
# ============================================================================
# Descomente quando configurar testes
# sonar.tests=src
# sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ============================================================================
# QUALITY PROFILES
# ============================================================================
# Sonar way for TypeScript (padrão recomendado)
# sonar.qualityprofile=ts-sonar-way

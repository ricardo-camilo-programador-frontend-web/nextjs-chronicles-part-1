# ============================================================================
# SonarQube Configuration - NextJS Chronicles Part 1
# Based on SGS_WEB_DEVELOPER_DEV reference implementation
# ============================================================================
sonar.projectKey=nextjs-chronicles-part-1
sonar.projectName=NextJS Chronicles Part 1
sonar.projectVersion=0.0.0
sonar.sources=src
sonar.host.url=http://localhost:9000
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**,*.tsbuildinfo,**/*.d.ts,**/.next/**,**/out/**,**/build/**
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/tests/**

# Coverage (if available)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info
